<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>إدارة المستخدمين</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

  body {
    font-family: 'Cairo', sans-serif;
    background: radial-gradient(circle at top left, #0f2027, #203a43, #2c5364);
    color: #eaf6ff;
    padding: 25px;
    margin: 0;
    overflow-x: hidden;
  }

  header {
    background: linear-gradient(135deg, #00b4db, #0083b0);
    color: white;
    text-align: center;
    font-size: 24px;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,255,255,0.4);
    margin-bottom: 25px;
    text-shadow: 0 0 8px rgba(255,255,255,0.7);
    animation: glowPulse 4s infinite alternate;
  }

  .section {
    background: rgba(15, 25, 35, 0.85);
    padding: 25px;
    margin-bottom: 25px;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
    border-right: 5px solid #00b4db;
    backdrop-filter: blur(6px);
    animation: fadeInUp 0.8s ease forwards;
    opacity: 0;
  }

  .section:nth-child(1) { animation-delay: 0.1s; }
  .section:nth-child(2) { animation-delay: 0.2s; }
  .section:nth-child(3) { animation-delay: 0.3s; }
  .section:nth-child(4) { animation-delay: 0.4s; }
  .section:nth-child(5) { animation-delay: 0.5s; }

  .section h2 {
    color: #00eaff;
    margin-bottom: 15px;
    border-bottom: 1px solid #00eaff66;
    padding-bottom: 5px;
    text-shadow: 0 0 6px rgba(0,234,255,0.6);
  }

  input, select, button {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    box-sizing: border-box;
    font-family: inherit;
    border-radius: 8px;
  }

input, select {
  border: 1px solid #00eaff66;
  background: rgba(20, 20, 30, 0.9); /* خلفية داكنة واضحة */
  color: #fff !important; /* النص أبيض */
  transition: 0.3s;
  caret-color: #00ffff; /* مؤشر الكتابة فيروزي */
}

/* شكل القائمة المنسدلة لما تتفتح */
select option {
  background-color: #111; /* خلفية سوداء للخيارات */
  color: #fff;            /* النص أبيض */
  padding: 8px;
}


  input::placeholder {
    color: #aaa;
  }
  input:focus, select:focus {
    border-color: #00ffff;
    box-shadow: 0 0 8px #00ffff;
    outline: none;
  }

  button {
    color: #fff;
    font-weight: bold;
    border: none;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 10px rgba(0,255,255,0.3);
  }

  #addBtn { background: linear-gradient(135deg, #00c851, #007e33); }
  #searchBtn { background: linear-gradient(135deg, #007BFF, #00b4ff); }
  #backupBtn { background: linear-gradient(135deg, #9333ea, #6f42c1); }
  #printVisaBtn { background: linear-gradient(135deg, #00bcd4, #0097a7); }
  button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(0,255,255,0.5);
    animation: pulse 0.3s ease-in-out;
  }

  .user-box {
    border: 1px solid #00eaff44;
    background: rgba(255,255,255,0.05);
    margin-bottom: 10px;
    padding: 12px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,255,255,0.05);
    transition: 0.3s;
  
  display:flex;
  flex-direction:column;
  align-items:flex-start;
}

  .user-box:hover {
    background: rgba(0,255,255,0.05);
    box-shadow: 0 0 12px rgba(0,255,255,0.3);
    transform: scale(1.01);
  }

  .user-box button {
  margin-top:8px;
    margin: 5px 5px 0 0;
    width: auto;
    padding: 6px 10px;
    border-radius: 8px;
  }

  .edit-btn { background: linear-gradient(135deg, #00c851, #009b43); }
  .delete-btn { background: linear-gradient(135deg, #ff4444, #cc0000); }

  footer {
    text-align: center;
    margin-top: 40px;
    padding: 15px 0;
    color: #fff;
    background: linear-gradient(135deg, #00b4db, #0083b0);
    font-weight: bold;
    font-size: 16px;
    border-radius: 12px;
    box-shadow: 0 -3px 15px rgba(0,255,255,0.4);
    text-shadow: 0 0 6px rgba(255,255,255,0.6);
    animation: glowPulse 4s infinite alternate;
  }

  html {
    scroll-behavior: smooth;
  }

  /* 🔥 الأنيميشن */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.07); }
    100% { transform: scale(1.03); }
  }

  @keyframes glowPulse {
    0% { box-shadow: 0 0 10px rgba(0,255,255,0.2); }
    100% { box-shadow: 0 0 25px rgba(0,255,255,0.6); }
  }
</style>



</head>
<body>

<div class="section">
  <h2>إضافة / تعديل مستخدم</h2>
  <input type="text" id="serial" placeholder="الرقم المسلسل (يُولد تلقائيًا)" readonly />
  <input type="text" id="name" placeholder="الاسم بالعربية" />
  <input type="text" id="nid" placeholder="الرقم القومي" />
  <input type="text" id="visa" placeholder="رقم الفيزا" />
  <input type="date" id="date" />
  <button id="addBtn">إضافة / تعديل</button>
</div>

<div class="section">
  <h2>طباعة كشف الفيز</h2>
  <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap;">
    <div style="font-size:18px; color:#007BFF; font-weight:bold;">
      عدد الفيز الإجمالي: <span id="visaCount">0</span>
    </div>
    <button id="printVisaBtn" style="background:#17a2b8; padding:10px 20px;">طباعة كشف الفيز</button>
  </div>
</div>



<div class="section">
  <h2>بحث عن مستخدم</h2>
  <select id="searchType">
    <option value="name">بحث بالاسم</option>
    <option value="nid">بحث بالرقم القومي</option>
    <option value="serial">بحث بالرقم المسلسل</option>
    <option value="visa">بحث برقم الفيزا</option>
  </select>
  <input type="text" id="searchQuery" placeholder="اكتب كلمة البحث هنا" />
  <button id="searchBtn">بحث</button>
  <div id="results" class="result"></div>
</div>

<div class="section">
  <h2>النسخ الاحتياطي و الاستعادة</h2>
  <button id="backupBtn">تحميل نسخة احتياطية (JSON)</button>
  <input type="file" id="restoreFile" accept=".json" />
</div>


<div class="section">
  <h2>مقارنة الفيز مع ملف Excel</h2>
  <input type="file" id="excelFile" accept=".xlsx, .xls" />
  <button onclick="compareExcel()">بدء المقارنة</button>

  <div id="extraVisas" class="result" style="margin-top:20px;"></div>
  <button onclick="deleteExtraVisas()" 
          style="background:#ff4444; padding:10px; width:100%; margin:10px 0;">
          حذف الفيز الزيادة
  </button>

  <div id="duplicateVisas" class="result" style="margin-top:20px;"></div>
  <button onclick="deleteDuplicateVisas()" 
          style="background:#cc0000; padding:10px; width:100%; margin:10px 0;">
          حذف الفيز المتكررة
  </button>
</div>

<div class="section">
  <h2>المستخدمون الذين مر على إضافتهم أكثر من 6 أشهر</h2>
  <button onclick="downloadExpiredAsTXT()" style="margin-bottom: 10px; background:green;">تحميل كـ TXT</button>
  <div id="expiredUsers" class="result"></div>
</div>

<footer style="text-align: center;
  margin-top: 40px;
  padding: 15px 0;
  color: #fff;
  background: #007BFF;
  font-weight: bold;
  font-size: 16px;
  border-radius: 10px;
  box-shadow: 0 -2px 8px rgba(0,0,0,0.2);
">
  Made by Arsany Rafik
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js">
function deleteSingleVisa(visaNumber) {
  if (!confirm("هل تريد حذف هذه الفيزا فقط؟")) return;

  loadUsers();
  users = users.filter(u => u.visa.trim() !== visaNumber.trim());
  saveUsers();
  showExpiredUsers();
  updateVisaCount();

  const box = [...document.querySelectorAll(".user-box")].find(div => div.textContent.includes(visaNumber));
  if (box) box.remove();

  alert("تم حذف الفيزا بنجاح");
}

</script>
<script>
  let users = [];
  let editMode = false;
  let editSerial = null;

  function loadUsers() {
    const data = localStorage.getItem('users');
    users = data ? JSON.parse(data) : [];
  }

  function saveUsers() {
    localStorage.setItem('users', JSON.stringify(users));
  }

  function updateVisaCount() {
  loadUsers();
  document.getElementById("visaCount").textContent = users.length;
}


  function generateSerial() {
    const serials = users.map(u => parseInt(u.serial)).sort((a, b) => a - b);
    let next = 1;
    for (let i = 0; i < serials.length; i++) {
      if (serials[i] > next) break;
      if (serials[i] === next) next++;
    }
    return next.toString();
  }
function printVisaSheet() {
  loadUsers();
  if (users.length === 0) {
    alert("لا توجد بيانات.");
    return;
  }

  const today = new Date().toISOString().split('T')[0];

  let content = `
    <html lang="ar" dir="rtl">
    <head>
      <meta charset="UTF-8">
      <title>كشف الفيز</title>
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        @page {
          size: A4;
          margin: 20mm;
        }

        body {
          font-family: 'Cairo', sans-serif;
          direction: rtl;
          text-align: right;
          margin: 0;
          padding: 0;
          background: #f9f9f9;
        }

        .page {
          width: 210mm;
          min-height: 297mm;
          margin: auto;
          padding: 15mm;
          background: #ffffff;
          box-sizing: border-box;
        }

        .frame {
          border: 4px double #007BFF;
          padding: 25px 30px;
          border-radius: 10px;
          background: #ffffff;
          box-shadow: 0 0 10px rgba(0,0,0,0.15);
          margin: 10mm; /* يبعد البرواز عن الحواف */
        }

        h2 {
          text-align: center;
          color: #007BFF;
          margin-bottom: 5px;
          font-size: 22px;
        }

        .date {
          text-align: center;
          margin-bottom: 10px;
          color: #444;
          font-size: 15px;
        }

        hr {
          margin: 15px 0;
          border: 1px dashed #aaa;
        }

        table {
          width: 100%;
          border-collapse: collapse;
        }

        td {
          width: 50%;
          padding: 6px 10px;
          font-size: 18px;
          vertical-align: top;
        }

        footer {
          text-align: center;
          color: #666;
          margin-top: 25px;
          font-size: 13px;
        }

        @media print {
          body {
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
          }
        }
      </style>
    </head>
    <body>
      <div class="page">
        <div class="frame">
          <h2>كشف الفيز</h2>
          <div class="date">تاريخ الطباعة: ${today}</div>
          <hr>
          <table>
  `;

  // نطبع الفيز في صفوف (2 في كل صف)
  for (let i = 0; i < users.length; i += 2) {
    const visa1 = users[i] ? `${i + 1}- ${users[i].visa}` : '';
    const visa2 = users[i + 1] ? `${i + 2}- ${users[i + 1].visa}` : '';
    content += `<tr><td>${visa1}</td><td>${visa2}</td></tr>`;
  }

  content += `
          </table>
          <hr>
          <footer>تم الطباعة بواسطة النظام</footer>
        </div>
      </div>
    </body>
    </html>
  `;

  const printWindow = window.open('', '_blank');
  printWindow.document.write(content);
  printWindow.document.close();
  printWindow.print();
}


document.getElementById('printVisaBtn').addEventListener('click', printVisaSheet);


  function resetForm() {
    document.getElementById('serial').value = generateSerial();
    document.getElementById('name').value = '';
    document.getElementById('nid').value = '';
    document.getElementById('visa').value = '';
    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    document.getElementById('results').innerHTML = '';
  }

  function addUser() {
    const name = document.getElementById('name').value.trim();
    const nid = document.getElementById('nid').value.trim();
    const visa = document.getElementById('visa').value.trim();
    let date = document.getElementById('date').value.trim();

    if (!name || !nid || !visa) {
      alert('يرجى ملء كل الحقول');
      return;
    }

    if (!/^\d+$/.test(nid)) {
      alert('الرقم القومي يجب أن يحتوي على أرقام فقط');
      return;
    }

    if (!date) date = new Date().toISOString().split('T')[0];

    if (editMode) {
      const index = users.findIndex(u => u.serial === editSerial);
      if (index !== -1) {
        users[index] = { serial: editSerial, name, nid, visa, date };
        alert('تم تعديل المستخدم');
      }
      editMode = false;
      editSerial = null;
    } else {
      const serial = generateSerial();
      if (users.find(u => u.nid === nid || u.visa === visa)) {
        alert('الرقم القومي أو الفيزا موجود مسبقاً');
        return;
      }
      users.push({ serial, name, nid, visa, date });
      alert('تمت الإضافة');
    }

    saveUsers();
    resetForm();
    showExpiredUsers();
    updateVisaCount();

  }

  function editUser(serial) {
    const user = users.find(u => u.serial === serial);
    if (!user) return;
    document.getElementById('serial').value = user.serial;
    document.getElementById('name').value = user.name;
    document.getElementById('nid').value = user.nid;
    document.getElementById('visa').value = user.visa;
    document.getElementById('date').value = user.date;
    editMode = true;
    editSerial = serial;
  }

  function deleteUser(serial) {
    if (!confirm('هل أنت متأكد؟')) return;
    users = users.filter(u => u.serial !== serial);
    saveUsers();
    showExpiredUsers();
    searchUser();
    updateVisaCount();

  }

  function searchUser() {
  const query = document.getElementById('searchQuery').value.trim().toLowerCase();
  const type = document.getElementById('searchType').value;
  const resultDiv = document.getElementById('results');
  loadUsers();

  const results = users.filter(user => {
    if (type === 'name') return user.name.toLowerCase().includes(query);
    if (type === 'nid') return user.nid.includes(query);
    if (type === 'serial') return user.serial.includes(query);
    if (type === 'visa') return user.visa.includes(query);
    return false;
  });

  resultDiv.innerHTML = results.length === 0 ? 'لا توجد نتائج.' : results.map(user => `
    <div class="user-box">
      <strong>رقم مسلسل:</strong> ${user.serial}<br>
      <strong>الاسم:</strong> ${user.name}<br>
      <strong>الرقم القومي:</strong> ${user.nid}<br>
      <strong>الفيزا:</strong> ${user.visa}<br>
      <strong>تاريخ الإضافة:</strong> ${user.date}<br>
      <button class="edit-btn" onclick="editUser('${user.serial}')">تعديل</button>
      <button class="delete-btn" onclick="deleteUser('${user.serial}')">حذف</button>
    </div>
  `).join('');
}


  function showExpiredUsers() {
    loadUsers();
    const div = document.getElementById("expiredUsers");
    const sixMonthsAgo = new Date();
    sixMonthsAgo.setMonth(sixMonthsAgo.getMonth() - 6);
    const expired = users.filter(user => new Date(user.date) < sixMonthsAgo);

    div.innerHTML = expired.length === 0 ? "لا يوجد مستخدمون مضى على إضافتهم أكثر من 6 أشهر." : expired.map(user => `
      <div class="user-box">
        <strong>الرقم المسلسل:</strong> ${user.serial}<br>
        <strong>الاسم:</strong> ${user.name}<br>
        <strong>الرقم القومي:</strong> ${user.nid}<br>
        <strong>الفيزا:</strong> ${user.visa}<br>
        <strong>تاريخ:</strong> ${user.date}<br>
        <button class="edit-btn" onclick="editUser('${user.serial}')">تعديل</button>
        <button class="delete-btn" onclick="deleteUser('${user.serial}')">حذف</button>
      </div>
    `).join('');
  }

  function backupData() {
    const blob = new Blob([JSON.stringify(users, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = "backup_users.json";
    a.click();
    URL.revokeObjectURL(url);
  }

  function restoreData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function (event) {
      try {
        const data = JSON.parse(event.target.result);
        if (Array.isArray(data)) {
          users = data;
          saveUsers();
          alert("تم الاستعادة بنجاح");
          showExpiredUsers();
        }
      } catch {
        alert("ملف غير صالح");
      }
    };
    reader.readAsText(file);
    updateVisaCount();

  }

  function downloadExpiredAsTXT() {
    const sixMonthsAgo = new Date();
    sixMonthsAgo.setMonth(sixMonthsAgo.getMonth() - 6);
    let content = "بيان الفيز المرتدة\n";
    content += "المستخدمون الذين مر على إضافتهم أكثر من 6 أشهر:\n\n";

    let i = 1;
    users.forEach(user => {
      if (new Date(user.date) < sixMonthsAgo) {
        content += `${i++}. مسلسل: ${user.serial} - الاسم: ${user.name} - الرقم القومي: ${user.nid} - الفيزا: ${user.visa} - التاريخ: ${user.date}\n`;
      }
    });

    const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "expired_users.txt";
    a.click();
    URL.revokeObjectURL(url);
  }

  window.onload = function () {
    loadUsers();
    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    document.getElementById('serial').value = generateSerial();
    showExpiredUsers();
    updateVisaCount();

  };

  document.getElementById('addBtn').addEventListener('click', addUser);
  document.getElementById('searchBtn').addEventListener('click', searchUser);
  document.getElementById('backupBtn').addEventListener('click', backupData);
  document.getElementById('restoreFile').addEventListener('change', restoreData);

function compareExcel() {
  const file = document.getElementById("excelFile").files[0];
  if (!file) { alert("يرجى اختيار ملف Excel أولاً"); return; }
  const reader = new FileReader();
  reader.onload = function (e) {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, { type: "array" });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

    let excelVisas = rows.flat().map(v => v.toString().trim()).filter(v => v !== "");

    loadUsers();
    let userVisas = users.map(u => u.visa.trim());

    let duplicate = excelVisas.filter((v, i) => excelVisas.indexOf(v) !== i);
    let duplicateBetween = excelVisas.filter(v => userVisas.includes(v));
    let extra = excelVisas.filter(v => !userVisas.includes(v));

    document.getElementById("extraVisas").innerHTML =
      `<h3>الفيز الزيادة:</h3>` +
      (extra.length === 0 ? "لا يوجد" :
        extra.map(v => `
  <div class="user-box">
    ${v}
    <button class="delete-btn" onclick="deleteSingleVisa('${v}')">حذف</button>
  </div>
`).join(""));

    document.getElementById("duplicateVisas").innerHTML =
      `<h3>الفيز المتكررة:</h3>` +
      (duplicate.length === 0 && duplicateBetween.length === 0 ? "لا يوجد" :
        [...duplicate, ...duplicateBetween]
        .map(v => `<div class="user-box">${v}</div>`).join(""));
  };
  reader.readAsArrayBuffer(file);
}

function deleteExtraVisas() {
  loadUsers();
  const extraDiv = document.querySelectorAll("#extraVisas .user-box");
  const extraVisas = [...extraDiv].map(v => v.textContent.trim());
  users = users.filter(u => !extraVisas.includes(u.visa.trim()));
  saveUsers();
  showExpiredUsers();
  updateVisaCount();
  alert("تم حذف الفيز الزيادة بنجاح");
  document.getElementById("extraVisas").innerHTML = "";
}

function deleteDuplicateVisas() {
  loadUsers();
  const dupDiv = document.querySelectorAll("#duplicateVisas .user-box");
  const dupVisas = [...dupDiv].map(v => v.textContent.trim());
  users = users.filter(u => !dupVisas.includes(u.visa.trim()));
  saveUsers();
  showExpiredUsers();
  updateVisaCount();
  alert("تم حذف الفيز المتكررة بنجاح");
  document.getElementById("duplicateVisas").innerHTML = "";
}


function deleteSingleVisa(visaNumber) {
  if (!confirm("هل تريد حذف هذه الفيزا فقط؟")) return;

  loadUsers();
  users = users.filter(u => u.visa.trim() !== visaNumber.trim());
  saveUsers();
  showExpiredUsers();
  updateVisaCount();

  const box = [...document.querySelectorAll(".user-box")].find(div => div.textContent.includes(visaNumber));
  if (box) box.remove();

  alert("تم حذف الفيزا بنجاح");
}

</script>

</body>
</html>
